apiVersion: v1
kind: ConfigMap
metadata:
  name: holmes-ui-api
data:
  NODE_ENV: production
  PORT: "8765"
  ADMIN_EMAIL: admin@example.com
  HOLMES_API_URL: https://holmes.observestack.fis-cloud.xplat.online
  HOLMES_API_VERIFY_SSL: "false"
  HOLMES_STREAM_IDLE_TIMEOUT_MS: "120000"
  OIDC_ISSUER_URL: ""
  OIDC_CLIENT_ID: ""
  OIDC_REDIRECT_URI: ""
  OIDC_SCOPES: openid email profile
  OIDC_DEFAULT_ROLE: viewer
  DEFAULT_MODEL: cloud-escalate
  DEFAULT_TIMEZONE: Asia/Ho_Chi_Minh
  CORS_ORIGIN: https://holmes-ui.example.com
