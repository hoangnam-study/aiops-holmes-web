apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: holmes-ui
  namespace: holmes-ui
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  tls:
    - hosts:
        - holmes-ui.example.com
      secretName: holmes-ui-tls
  rules:
    - host: holmes-ui.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  name: http
