apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app.kubernetes.io/name: holmes-ui
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8765
      targetPort: http
  selector:
    app.kubernetes.io/name: holmes-ui
    app.kubernetes.io/component: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app.kubernetes.io/name: holmes-ui
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: holmes-ui
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: holmes-ui
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/holmes-ui-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8765
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          envFrom:
            - configMapRef:
                name: holmes-ui-api
            - secretRef:
                name: holmes-ui-api
          env:
            - name: MONGODB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: holmes-ui-mongo
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: holmes-ui-mongo
                  key: MONGO_INITDB_ROOT_PASSWORD
            - name: MONGODB_URI
              value: mongodb://$(MONGODB_USERNAME):$(MONGODB_PASSWORD)@mongo:27017/holmes-ui?authSource=admin
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
